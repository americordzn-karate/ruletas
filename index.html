<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Ruleta de Retos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px 48px;
  }

  h1 {
    font-size: clamp(1.3rem, 5vw, 2rem);
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 16px;
    color: #f5c842;
    text-align: center;
  }

  #selector-box {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }

  #selector-box label { font-size: 0.95rem; color: #ccc; }

  #ruleta-select {
    padding: 8px 14px;
    border-radius: 8px;
    border: 2px solid #f5c842;
    background: #16213e;
    color: #f0f0f0;
    font-size: 1rem;
    cursor: pointer;
    outline: none;
    min-width: 160px;
    max-width: 260px;
  }

  #loading-msg {
    color: #f5c842;
    font-size: 0.88rem;
    font-style: italic;
    text-align: center;
    width: 100%;
  }

  #wheel-wrapper {
    position: relative;
    width: min(92vw, 400px);
    height: min(92vw, 400px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #wheel-canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow: 0 0 36px #0008, 0 0 0 5px #f5c842, 0 0 0 9px #333;
    display: block;
    touch-action: none;
  }

  #arrow {
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 32px solid #f5c842;
    filter: drop-shadow(0 2px 4px #0008);
    z-index: 10;
  }

  #center-circle {
    position: absolute;
    width: 46px; height: 46px;
    border-radius: 50%;
    background: #f5c842;
    border: 4px solid #fff;
    box-shadow: 0 2px 10px #0006;
    z-index: 10;
    pointer-events: none;
  }

  #spin-btn {
    margin-top: 22px;
    padding: 15px 52px;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 1px;
    background: #f5c842;
    color: #1a1a2e;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 16px #f5c84244;
    transition: transform 0.1s, box-shadow 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 52px;
  }

  #spin-btn:active { transform: scale(0.96); }
  #spin-btn:disabled {
    background: #555; color: #999;
    cursor: not-allowed; box-shadow: none; transform: none;
  }

  #result-box {
    margin-top: 20px;
    background: #16213e;
    border: 2px solid #f5c842;
    border-radius: 16px;
    padding: 16px 24px;
    text-align: center;
    width: min(92vw, 400px);
    min-height: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  #result-label {
    font-size: 0.78rem;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #result-text {
    font-size: clamp(1.1rem, 4vw, 1.45rem);
    font-weight: 700;
    color: #f5c842;
    word-break: break-word;
  }

  /* Botón de repetir voz */
  #speak-btn {
    margin-top: 10px;
    padding: 8px 22px;
    font-size: 0.9rem;
    font-weight: 600;
    background: transparent;
    color: #f5c842;
    border: 1.5px solid #f5c842;
    border-radius: 50px;
    cursor: pointer;
    display: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 38px;
  }
  #speak-btn.visible { display: inline-block; }

  #error-msg {
    color: #ff6b6b;
    font-size: 0.88rem;
    margin-top: 8px;
    text-align: center;
    max-width: 400px;
    width: 100%;
  }
</style>
</head>
<body>

<h1>🎡 Ruleta de Retos</h1>

<div id="selector-box">
  <label for="ruleta-select">Seleccionar ruleta:</label>
  <select id="ruleta-select" disabled>
    <option value="">-- Cargando... --</option>
  </select>
  <span id="loading-msg">Conectando con la base de datos…</span>
</div>

<div id="wheel-wrapper">
  <div id="arrow"></div>
  <canvas id="wheel-canvas" width="400" height="400"></canvas>
  <div id="center-circle"></div>
</div>

<button id="spin-btn" disabled>🎲 ¡Girar!</button>

<div id="result-box">
  <span id="result-label">Resultado</span>
  <span id="result-text">Gira la ruleta para descubrir tu reto</span>
  <button id="speak-btn">🔊 Escuchar de nuevo</button>
</div>

<div id="error-msg"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIzS6h-v2etceTGtyvpgscOE_EZXKRKO7wAwhMbWcpI1RxPjR2SGMEg8EzP4yV7pjm2A/exec";

const PALETTE = [
  { bg: "#D4A017", text: "#1a1a2e" },
  { bg: "#1a1a1a", text: "#f5c842" },
  { bg: "#6b6b6b", text: "#f0f0f0" },
];

const canvas   = document.getElementById("wheel-canvas");
const ctx      = canvas.getContext("2d");
const select   = document.getElementById("ruleta-select");
const spinBtn  = document.getElementById("spin-btn");
const resTxt   = document.getElementById("result-text");
const errMsg   = document.getElementById("error-msg");
const loadMsg  = document.getElementById("loading-msg");
const speakBtn = document.getElementById("speak-btn");

let options      = [];
let currentAngle = 0;
let isSpinning   = false;
let lastWinner   = "";

// ── Audio (click) ──────────────────────────────
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playClick() {
  try {
    const ac   = getAudioCtx();
    const osc  = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = "square";
    osc.frequency.setValueAtTime(600, ac.currentTime);
    gain.gain.setValueAtTime(0.1, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.055);
    osc.start();
    osc.stop(ac.currentTime + 0.06);
  } catch(e) {}
}

// ── Síntesis de voz — optimizada para móvil ───
let voicesReady  = false;
let cachedVoice  = null;

function loadVoices() {
  const list = window.speechSynthesis.getVoices();
  if (list.length > 0) {
    voicesReady = true;
    // Prioridad: es-MX > es-419 > es-US > cualquier es-*
    const priority = ["es-MX","es-419","es-US","es-ES"];
    for (const lang of priority) {
      const v = list.find(v => v.lang === lang);
      if (v) { cachedVoice = v; break; }
    }
    if (!cachedVoice) {
      cachedVoice = list.find(v => v.lang.startsWith("es")) || null;
    }
  }
}

if (window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speakResult(text) {
  if (!window.speechSynthesis) return;

  // iOS Safari: cancelar cualquier utterance pendiente
  window.speechSynthesis.cancel();

  const utter    = new SpeechSynthesisUtterance("Tu reto es: " + text);
  utter.lang     = "es-MX";
  utter.rate     = 0.9;
  utter.pitch    = 1.05;
  utter.volume   = 1;

  if (cachedVoice) utter.voice = cachedVoice;

  // Workaround iOS: la síntesis se pausa sola en textos largos
  const resumeTimer = setInterval(() => {
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
  }, 250);
  utter.onend = utter.onerror = () => clearInterval(resumeTimer);

  window.speechSynthesis.speak(utter);
}

// ── Dibujo ─────────────────────────────────────
function drawWheel(angle) {
  const sz = canvas.width;
  const cx = sz / 2, cy = sz / 2, r = cx - 6;
  const n  = options.length;
  ctx.clearRect(0, 0, sz, sz);

  if (n === 0) {
    ctx.fillStyle = "#333";
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#888"; ctx.font = "16px Segoe UI";
    ctx.textAlign = "center"; ctx.fillText("Sin opciones", cx, cy);
    return;
  }

  const slice = (Math.PI * 2) / n;

  for (let i = 0; i < n; i++) {
    const start = angle + i * slice;
    const end   = start + slice;
    const color = PALETTE[i % PALETTE.length];

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = color.bg; ctx.fill();
    ctx.strokeStyle = "#111"; ctx.lineWidth = 1.5; ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = color.text;

    const maxW = r * 0.78;
    const fs = Math.max(10, Math.min(15, Math.floor(maxW / (options[i].length * 0.62 + 1))));
    ctx.font = `bold ${fs}px Segoe UI`;
    let label = options[i];
    while (ctx.measureText(label).width > maxW - 28 && label.length > 4) label = label.slice(0, -1);
    if (label !== options[i]) label += "…";
    ctx.fillText(label, r - 10, fs / 3);
    ctx.restore();
  }

  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = "#f5c842"; ctx.lineWidth = 4; ctx.stroke();
}

// ── Animación ──────────────────────────────────
function spin() {
  if (isSpinning || options.length === 0) return;
  getAudioCtx(); // desbloquear audio en el gesto del usuario

  isSpinning = true;
  spinBtn.disabled = true;
  speakBtn.classList.remove("visible");
  resTxt.textContent = "Girando…";
  errMsg.textContent = "";

  const n          = options.length;
  const totalSpin  = Math.PI * 2 * (6 + Math.random() * 4) + Math.random() * Math.PI * 2;
  const duration   = 5000 + Math.random() * 2000;
  const startAngle = currentAngle;
  const startTime  = performance.now();
  let lastSeg      = -1;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const progress     = Math.min((now - startTime) / duration, 1);
    const angle        = startAngle + totalSpin * easeOut(progress);
    currentAngle       = angle;
    drawWheel(angle);

    const norm = ((angle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
    const seg  = Math.floor((((Math.PI*1.5 - norm + Math.PI*2) % (Math.PI*2)) / (Math.PI*2)) * n) % n;
    if (seg !== lastSeg) { playClick(); lastSeg = seg; }

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      const finalNorm    = ((currentAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
      const pointerAngle = (Math.PI*1.5 - finalNorm + Math.PI*2) % (Math.PI*2);
      const winner       = Math.floor((pointerAngle / (Math.PI*2)) * n) % n;

      lastWinner = options[winner];
      resTxt.textContent = lastWinner;
      isSpinning = false;
      spinBtn.disabled = false;
      speakBtn.classList.add("visible");

      // Pequeña pausa antes de hablar para que el navegador no corte el audio
      setTimeout(() => speakResult(lastWinner), 400);
    }
  }

  requestAnimationFrame(animate);
}

// ── Datos ──────────────────────────────────────
async function fetchJSON(url) {
  const res = await fetch(url, { redirect: "follow" });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadSheets() {
  try {
    const data = await fetchJSON(`${APPS_SCRIPT_URL}?action=getSheets`);
    if (data.error) throw new Error(data.error);
    select.innerHTML = "";
    data.sheets.forEach(name => {
      const o = document.createElement("option");
      o.value = name; o.textContent = name;
      select.appendChild(o);
    });
    select.disabled = false;
    loadMsg.textContent = `${data.sheets.length} ruleta(s) encontrada(s).`;
    await loadOptions(data.sheets[0]);
  } catch (err) {
    loadMsg.textContent = "";
    errMsg.textContent = `Error al cargar hojas: ${err.message}`;
    drawWheel(0);
  }
}

async function loadOptions(sheetName) {
  options = []; spinBtn.disabled = true;
  speakBtn.classList.remove("visible");
  resTxt.textContent = "Cargando opciones…";
  errMsg.textContent = ""; drawWheel(0);
  try {
    const data = await fetchJSON(`${APPS_SCRIPT_URL}?action=getOptions&sheet=${encodeURIComponent(sheetName)}`);
    if (data.error) throw new Error(data.error);
    options = data.options;
    if (options.length === 0) {
      errMsg.textContent = `La hoja "${sheetName}" no tiene opciones.`;
      drawWheel(0); return;
    }
    currentAngle = 0; drawWheel(0);
    spinBtn.disabled = false;
    resTxt.textContent = "Gira la ruleta para descubrir tu reto";
  } catch (err) {
    errMsg.textContent = `Error al cargar opciones: ${err.message}`; drawWheel(0);
  }
}

// ── Eventos ────────────────────────────────────
select.addEventListener("change", () => loadOptions(select.value));
spinBtn.addEventListener("click", spin);
speakBtn.addEventListener("click", () => { if (lastWinner) speakResult(lastWinner); });

// ── Inicio ─────────────────────────────────────
loadSheets();
</script>
</body>
</html>
